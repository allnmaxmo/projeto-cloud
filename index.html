<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olá, Nuvem</title>
<style>
  body{margin:0; min-height:100vh; display:grid; place-items:center;
    font-family:system-ui, sans-serif; background:#0f172a; color:#f8fafc;}
  main{text-align:center; padding:30px; max-width:520px;}
  h1{font-size:42px; margin:0 0 10px;}
  #status{font-size:18px; color:#cbd5e1; min-height:54px; line-height:1.5;}
  input{display:block; width:100%; box-sizing:border-box; margin:18px 0 0;
    padding:12px 14px; border:1px solid #334155; border-radius:10px;
    background:#1e293b; color:#f8fafc; font-size:15px; text-align:center;}
  input::placeholder{color:#94a3b8;}
  button{margin-top:18px; background:#38bdf8; color:#0f172a; border:none;
    padding:12px 22px; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer;}
  button:hover{background:#7dd3fc;}
</style>
</head>
<body>
  <main>
    <h1 id="titulo">Olá, Nuvem</h1>
    <p id="status">Carregando a resposta do servidor...</p>
    <input id="nome" type="text" placeholder="Digite seu nome">
    <button id="btnHora">Buscar hora</button>
    <button id="btnSorteio">Sortear numero</button>
  </main>

<script>
  // PASSO DO MOVIMENTO 4:
  // Troque o texto abaixo pela URL do SEU Worker (termina em .workers.dev).
  const URL_DO_WORKER = "https://projetinhoestudocloud-api.allnmaxmo.workers.dev/";

  function montarUrl(caminho) {
    return new URL(caminho, URL_DO_WORKER);
  }

  async function buscarHora() {
    const status = document.getElementById("status");
    const nome = document.getElementById("nome").value.trim();
    const url = montarUrl("/hora");

    if (nome) {
      url.searchParams.set("nome", nome);
    }

    status.textContent = "Buscando...";
    try {
      const resposta = await fetch(url.toString());
      if (!resposta.ok) {
        status.textContent = "Não encontrei essa rota. Tente novamente em alguns instantes.";
        return;
      }
      const dados = await resposta.json();
      document.getElementById("titulo").textContent = dados.mensagem;
      status.textContent =
        "Hora do servidor: " +
        dados.horaDoServidor +
        " Frase do dia: " +
        dados.fraseDoDia;
    } catch (erro) {
      status.textContent = "Nao consegui falar com o Worker. Confira a URL.";
    }
  }

  async function buscarSorteio() {
    const status = document.getElementById("status");
    const url = montarUrl("/sorteio");

    status.textContent = "Sorteando...";
    try {
      const resposta = await fetch(url.toString());
      if (!resposta.ok) {
        status.textContent = "Não encontrei essa rota. Tente novamente em alguns instantes.";
        return;
      }
      const dados = await resposta.json();
      status.textContent = dados.mensagem + " " + dados.numeroSorteado;
    } catch (erro) {
      status.textContent = "Nao consegui falar com o Worker. Confira a URL.";
    }
  }

  document.getElementById("btnHora").addEventListener("click", buscarHora);
  document.getElementById("btnSorteio").addEventListener("click", buscarSorteio);
  buscarHora();
</script>
</body>
</html>
